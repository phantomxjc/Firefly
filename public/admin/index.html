<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Firefly · 后台管理</title>
  <link rel="icon" href="/favicon/favicon.svg" />
  <style>
    :root {
      --primaryColor: #3b82f6;
      --primaryLightest: #eff6ff;
      --textFieldBorderColor: #e2e8f0;
      --borderRadius: 8px;
    }
    #nc-root {
      min-height: 100vh;
    }
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .loading-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      margin-bottom: 24px;
    }
  </style>
  <!--
    ============================================================
    Fetch 拦截器：修复 Decap CMS GitHub 后端的 git/trees 404 问题
    ============================================================
    
    问题：Decap CMS 的 GitHub 后端在读取单个文件时，先调用
    git/trees/{branch}:{dirPath} 获取文件 SHA，再通过 SHA
    读取文件内容。但 git/trees 的冒号路径语法在浏览器端
    会返回 404（服务端直接调用则正常）。
    
    修复：拦截 fetch 请求，当 git/trees 返回 404 时，
    自动改用 contents API 获取文件 SHA，并构造兼容的
    响应格式返回给 Decap CMS。
    
    必须在 decap-cms.js 加载之前执行！
    ============================================================
  -->
  <script>
    (function() {
      var originalFetch = window.fetch;
      window.fetch = function(input, init) {
        var url = typeof input === 'string' ? input : input.url;

        // 只拦截 git/trees 请求
        if (url && url.includes('/git/trees/') && url.includes('api.github.com')) {
          return originalFetch.call(this, input, init).then(function(response) {
            if (response.status === 404) {
              // 解析 URL: .../git/trees/{branch}:{encodedPath}
              var match = url.match(/\/git\/trees\/([^:]+):(.+?)(\?|$)/);
              if (match) {
                var branch = match[1];
                var dirPath = decodeURIComponent(match[2]);
                // 改用 contents API 获取目录内容
                var contentsUrl = url.replace(
                  /\/git\/trees\/[^?]+/,
                  '/contents/' + encodeURIComponent(dirPath).replace(/%2F/g, '/')
                ).replace(/(\?|$)/, '?ref=' + branch + '&');

                return originalFetch.call(this, contentsUrl, init).then(function(contentsResponse) {
                  if (!contentsResponse.ok) {
                    return response; // contents 也失败，返回原始 404
                  }
                  return contentsResponse.json().then(function(contentsData) {
                    // contents API 返回数组，转换为 git/trees 格式
                    var items = Array.isArray(contentsData) ? contentsData : [contentsData];
                    var treeItems = items.map(function(item) {
                      return {
                        path: item.name,
                        mode: item.type === 'dir' ? '040000' : '100644',
                        type: item.type === 'dir' ? 'tree' : 'blob',
                        sha: item.sha,
                        size: item.size || 0,
                        url: item.git_url || item.url
                      };
                    });
                    var treeResponse = {
                      sha: items[0] ? items[0].sha : '',
                      url: url,
                      tree: treeItems,
                      truncated: false
                    };
                    return new Response(JSON.stringify(treeResponse), {
                      status: 200,
                      statusText: 'OK',
                      headers: { 'Content-Type': 'application/json' }
                    });
                  });
                }).catch(function() {
                  return response; // fallback 到原始 404
                });
              }
            }
            return response;
          });
        }

        return originalFetch.call(this, input, init);
      };
    })();
  </script>
  <!-- Pin to exact version to avoid breaking changes -->
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      }, 500);
    });
  </script>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="loading-logo">✦</div>
    <div class="loading-text">LOADING FIREFLY CMS...</div>
  </div>
</body>
</html>
