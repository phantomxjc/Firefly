<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Firefly · 后台管理</title>
  <link rel="icon" href="/favicon/favicon.svg" />
  <style>
    #nc-root { min-height: 100vh; }
    .cms-loading {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .cms-loading-logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 24px; color: white;
      margin-bottom: 16px;
    }
  </style>
  <script>
  (function() {
    var origFetch = window.fetch;
    window.fetch = function(input, init) {
      var url = typeof input === 'string' ? input : input.url;
      if (url && url.indexOf('/git/trees/') !== -1 && url.indexOf('api.github.com') !== -1) {
        return origFetch.call(this, input, init).then(function(resp) {
          if (resp.status !== 404) return resp;
          var m = url.match(/\/git\/trees\/([^:]+):([^?]+)/);
          if (!m) return resp;
          var branch = m[1];
          var dirPath = decodeURIComponent(m[2]);
          var contentsUrl = 'https://api.github.com/repos/phantomxjc/Firefly/contents/' + dirPath + '?ref=' + branch;
          return origFetch.call(this, contentsUrl, init).then(function(cResp) {
            if (!cResp.ok) return resp;
            return cResp.json().then(function(data) {
              var items = Array.isArray(data) ? data : [data];
              var tree = items.map(function(it) {
                return {
                  path: it.name,
                  mode: it.type === 'dir' ? '040000' : '100644',
                  type: it.type === 'dir' ? 'tree' : 'blob',
                  sha: it.sha,
                  size: it.size || 0,
                  url: it.git_url || it.url
                };
              });
              return new Response(JSON.stringify({ sha: '', url: url, tree: tree, truncated: false }), {
                status: 200, statusText: 'OK',
                headers: { 'Content-Type': 'application/json' }
              });
            });
          }).catch(function() { return resp; });
        });
      }
      return origFetch.call(this, input, init);
    };
  })();
  </script>
</head>
<body>
  <div id="nc-root">
    <div class="cms-loading" id="cms-loading">
      <div class="cms-loading-logo">✦</div>
      <div>Loading Firefly CMS...</div>
    </div>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function() {
      var check = setInterval(function() {
        var el = document.getElementById('cms-loading');
        if (!el) { clearInterval(check); return; }
        if (!document.body.contains(el)) { clearInterval(check); }
      }, 500);
      setTimeout(function() {
        var el = document.getElementById('cms-loading');
        if (el) el.remove();
      }, 10000);
    })();
  </script>
</body>
</html>
